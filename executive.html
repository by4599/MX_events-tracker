<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>임원 기본 정보 입력</title>
<style>
body{
  font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
  margin:0; padding:16px; background:#f9f9f9; color:#111;
}
.card{
  max-width:420px; margin:0 auto; background:#fff; padding:16px;
  border-radius:12px; box-shadow:0 2px 6px rgba(0,0,0,.1);
}
h2{ margin-top:0; font-size:18px; }
label{ display:block; margin:8px 0 4px; font-weight:600; font-size:14px; }

input[type="text"], input[type="tel"]{
  width:100%; padding:10px 12px; font-size:14px;
  border:1.5px solid #ddd; border-radius:8px; background:#fff;
  transition:.2s; outline:none; box-sizing:border-box;
}
input::placeholder{ color:#aaa; font-size:13px; }
input:focus{ border-color:#111; box-shadow:0 0 0 3px rgba(17,17,17,.08); }

.btn{ padding:10px 12px; border:0; border-radius:6px; cursor:pointer; font-weight:600; font-size:14px; }
.btn.primary{ background:#111; color:#fff; width:100%; margin-top:12px; }
.btn.primary:disabled{ background:#999; cursor:not-allowed; }
.msg{ margin-top:8px; font-size:13px; }
.req{ color:#e11; margin-left:2px; }
</style>
</head>
<body>
<div class="card">
  <h2>임원 기본 정보 입력</h2>

  <label for="name">성명 <span class="req">*</span></label>
  <input id="name" type="text" placeholder="예) 홍길동" autocomplete="name" />

  <label for="phone">연락처 <span class="req">*</span></label>
  <input id="phone" type="tel" placeholder="010-1234-5678 (하이픈 포함)" autocomplete="tel" />

  <div id="msg" class="msg"></div>

  <button class="btn primary" id="btnNext" disabled>다음 (상세 정보 입력)</button>
</div>

<script>
(function(){
  "use strict";

  const $ = (id) => document.getElementById(id);

  if(localStorage.getItem('executive:consent') !== 'true'){
    alert('개인정보 수집 동의가 필요합니다.');
    location.replace('./executive_privacy.html');
  }

  function setMsg(text, color="#333"){
    $('msg').textContent = text;
    $('msg').style.color = color;
  }

  function validate(){
    const name  = ($('name').value  || '').trim();
    const phone = ($('phone').value || '').trim();
    const btn   = $('btnNext');

    if(!name || !phone){ btn.disabled = true; setMsg(''); return; }
    if(!/^[0-9-]{9,14}$/.test(phone)){
      setMsg('연락처 형식을 확인해 주세요. (예: 010-1234-5678)', '#b45309');
      btn.disabled = true;
      return;
    }
    setMsg('');
    btn.disabled = false;
  }

  $('name').addEventListener('input', validate);
  $('phone').addEventListener('input', validate);

  $('btnNext').addEventListener('click', () => {
    const phase1 = {
      name:  ($('name').value  || '').trim(),
      phone: ($('phone').value || '').trim()
    };
    try { localStorage.setItem('executive:phase1', JSON.stringify(phase1)); } catch(_){}
    location.href = './executive_detail.html';
  });
})();
</script>
</body>
</html>

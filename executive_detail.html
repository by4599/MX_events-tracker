<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>임원 추가 정보 입력</title>
  <style>
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;margin:0;padding:16px;background:#f9f9f9;color:#111}
    .card{max-width:420px;margin:0 auto;background:#fff;padding:16px;border-radius:12px;box-shadow:0 2px 6px rgba(0,0,0,.1)}
    h1{margin:0 0 6px 0;font-size:18px}
    h3{margin:12px 0 8px 0;font-size:16px;font-weight:800}
    label{display:block;margin:8px 0 4px;font-weight:600;font-size:14px}
    .help{font-size:12px;color:#8a8a8a;margin-top:6px}
    .section{margin-top:16px;padding-top:12px;border-top:1px solid #eee}
    .hidden{display:none !important}
    .error{color:#b91c1c;font-size:12px;margin-top:6px}

    input[type="text"],select{
      width:100%;padding:10px 12px;font-size:14px;border:1.5px solid #ddd;border-radius:8px;background:#fff;
      transition:.2s;outline:none;box-sizing:border-box
    }
    input::placeholder{color:#aaa;font-size:13px}
    input:focus,select:focus{border-color:#111;box-shadow:0 0 0 3px rgba(17,17,17,.08)}
    .row{display:flex;gap:6px}
    .col{flex:1}

    .btn{padding:10px 12px;border:0;border-radius:6px;cursor:pointer;font-weight:600;font-size:14px}
    .btn.primary{background:#111;color:#fff}
    .btn.ghost{background:transparent;border:1.5px solid #ddd}
    .btn.full{width:100%}
    .btn.disabled{opacity:.5;cursor:not-allowed}

    .seg{display:flex;gap:6px;flex-wrap:wrap}
    .seg__btn{flex:1;padding:10px 12px;border:1.5px solid #ddd;border-radius:6px;background:#fff;font-weight:600;font-size:14px;cursor:pointer}
    .seg__btn[aria-pressed="true"],.seg__btn.is-selected{background:#111;color:#fff;border-color:#111}

    /* ===== 서명 캔버스 ===== */
    .sign-wrap{position:relative;border:1.5px solid #ddd;border-radius:8px;overflow:hidden;background:#fafafa;touch-action:none}
    .sign-wrap canvas{display:block;width:100%;height:160px}
    .sign-clear{position:absolute;top:8px;right:8px;padding:4px 10px;font-size:12px;border:1px solid #bbb;border-radius:6px;background:#fff;cursor:pointer}
    .sign-hint{font-size:12px;color:#aaa;text-align:center;padding:6px 0}

    dialog{border:none;border-radius:12px;max-width:420px;width:calc(100% - 24px);padding:0}
    dialog .dlg-body{padding:16px}
    dialog .dlg-head{padding:12px 16px;font-weight:700;border-bottom:1px solid #eee}
    dialog .dlg-foot{padding:12px 16px;display:flex;gap:8px;justify-content:flex-end;border-top:1px solid #eee}

    .footer{display:flex;justify-content:center;gap:8px;margin-top:16px}
    .toast{position:fixed;left:50%;bottom:20px;transform:translateX(-50%);background:#111;color:#fff;padding:10px 14px;border-radius:8px;display:none;font-size:14px}
    .req{color:#e11;margin-left:2px}
  </style>
</head>
<body>
  <div class="card" role="region" aria-label="추가 정보 입력">
    <h1>추가 정보 입력</h1>
    <p class="help">아래 항목을 모두 작성 후 제출해 주세요</p>

    <!-- 청탁금지법 -->
    <section class="section" id="sec-act">
      <h3>청탁금지법(배우자 포함) <span class="req">*</span></h3>
      <div class="seg" role="group" aria-label="청탁금지법 대상 여부">
        <button type="button" class="seg__btn" id="btn-act-no"  data-act="비대상" aria-pressed="false">비대상</button>
        <button type="button" class="seg__btn" id="btn-act-yes" data-act="대상"   aria-pressed="false">대상</button>
      </div>

      <div id="act-extra" class="hidden" style="margin-top:8px">
        <div class="seg" role="group" aria-label="본인/배우자 선택" style="margin-bottom:8px">
          <button type="button" class="seg__btn" id="btn-who-self"   data-who="본인"   aria-pressed="false">본인</button>
          <button type="button" class="seg__btn" id="btn-who-spouse" data-who="배우자" aria-pressed="false">배우자</button>
        </div>
        <div id="spouse-wrap" class="hidden">
          <label for="spouseCombined">배우자 직장 및 직책</label>
          <input type="text" id="spouseCombined" placeholder="예) OO회사 과장" />
        </div>
      </div>
    </section>

    <!-- 축의/부조 계좌 -->
    <section class="section" id="sec-account">
      <h3>계좌번호 <span class="req">*</span></h3>
      <div class="row">
        <div class="col" id="bankCol">
          <select id="bankSelect" aria-label="은행 선택">
            <option value="">은행 선택</option>
            <option>국민</option><option>신한</option><option>우리</option>
            <option>하나</option><option>농협</option><option>기업</option>
            <option>새마을금고</option><option>대구</option><option>부산</option>
            <option>카카오뱅크</option><option>토스뱅크</option>
            <option value="__custom__">직접입력</option>
          </select>
          <input class="hidden" id="bankInput" type="text" placeholder="은행명 입력" aria-label="은행명 직접 입력" />
        </div>
        <div class="col">
          <input type="text" id="account" placeholder="계좌번호(하이픈 포함)" aria-label="계좌번호" />
        </div>
      </div>
    </section>

    <!-- 계좌 공개 여부 -->
    <section class="section" id="sec-open">
      <h3>계좌번호 공개 여부 <span class="req">*</span></h3>
      <div class="seg" role="group" aria-label="계좌 공개 여부 선택">
        <button type="button" class="seg__btn" id="btn-open-yes" data-open="희망"   aria-pressed="false">공개 희망</button>
        <button type="button" class="seg__btn" id="btn-open-no"  data-open="비희망" aria-pressed="false">공개 비희망</button>
      </div>
      <div class="help">※ 퇴임임원 안내 문자 내 계좌번호 포함 여부</div>
    </section>

    <!-- 서명 -->
    <section class="section" id="sec-sign">
      <h3>서명 <span class="req">*</span></h3>
      <div class="sign-wrap">
        <canvas id="signCanvas" width="760" height="320" aria-label="서명 영역"></canvas>
        <button type="button" class="sign-clear" id="btnClearSign" aria-label="서명 초기화">초기화</button>
      </div>
      <div class="sign-hint">위 영역에 서명해 주세요</div>
      <input type="hidden" id="signData" />
    </section>

    <!-- 미리보기 버튼 -->
    <section class="section" id="sec-preview">
      <button class="btn primary full disabled" id="btn-preview" aria-disabled="true">제출 내용 미리보기</button>
      <div id="err" class="error hidden"></div>
    </section>

    <!-- Footer -->
    <div class="footer">
      <button class="btn primary" id="btn-submit" disabled>제출</button>
      <a class="btn ghost" href="./executive.html" id="btn-back">이전</a>
    </div>
  </div>

  <!-- 미리보기 모달 -->
  <dialog id="dlg">
    <div class="dlg-head">제출 내용 미리보기</div>
    <div class="dlg-body">
      <div style="font-size:14px;line-height:1.4;margin-bottom:8px"><b>제목</b></div>
      <pre id="previewSubject" style="white-space:pre-wrap;font-size:14px;line-height:1.4;margin:0 0 12px 0;background:#f7f7f7;padding:8px;border-radius:8px"></pre>
      <div style="font-size:14px;line-height:1.4;margin-bottom:8px"><b>본문</b></div>
      <pre id="previewBody" style="white-space:pre-wrap;font-size:14px;line-height:1.5;margin:0;background:#f7f7f7;padding:8px;border-radius:8px"></pre>
    </div>
    <div class="dlg-foot">
      <button class="btn ghost" id="dlg-cancel">닫기</button>
      <button class="btn primary" id="dlg-ok">확인하고 제출</button>
    </div>
  </dialog>

  <div class="toast" id="toast"></div>

<script>
/* ================== 설정 ================== */
const ENDPOINT = "https://script.google.com/macros/s/AKfycbwsBf2tcQ_17Fpu_yDcEcn4uQDnZ0T8bU5L9KJtkgCCvXOsn5IfKEwVTP5_o7-fQmbvww/exec";

/* ================== 공통 유틸 ================== */
const el = (id) => document.getElementById(id);
const show = (x) => x.classList.remove('hidden');
const hide = (x) => x.classList.add('hidden');
const press = (btn, on) => {
  btn.setAttribute('aria-pressed', String(!!on));
  btn.classList.toggle('is-selected', !!on);
};

function showToast(msg, ms=2800){
  const t = el('toast');
  t.textContent = msg;
  t.style.display = 'block';
  setTimeout(() => { t.style.display = 'none'; }, ms);
}

function jsonpFallback(url){
  return new Promise((resolve, reject) => {
    const cb = `__gas_cb_${Date.now()}_${Math.random().toString(36).slice(2)}`;
    const s = document.createElement('script');
    window[cb] = (data) => { try{ resolve(data); } finally { delete window[cb]; s.remove(); } };
    s.src = url + (url.includes('?') ? '&' : '?') + 'callback=' + cb;
    s.onerror = () => { delete window[cb]; s.remove(); reject(new Error('JSONP failed')); };
    document.head.appendChild(s);
  });
}

async function fetchJson(url){
  try{
    const r = await fetch(url, { method: 'GET' });
    if(r.ok) return await r.json();
    throw new Error(`HTTP ${r.status}`);
  }catch(_){
    return jsonpFallback(url);
  }
}

/* ================== Phase1 데이터 로드 ================== */
let PHASE1 = null;
try {
  const raw = localStorage.getItem('executive:phase1');
  if(raw) PHASE1 = JSON.parse(raw);
} catch(_){}

if(!PHASE1 || !PHASE1.name){
  alert('기본 정보가 없어 이전 페이지로 이동합니다.');
  location.replace('./executive.html');
}

/* ================== 상태 ================== */
const state = {
  act: '', who: '', spouseCombined: '',
  bank: '', account: '', open: '',
  signed: false
};

/* ================== 청탁금지법 ================== */
function selectAct(v){
  state.act = v;
  press(el('btn-act-no'), v === '비대상');
  press(el('btn-act-yes'), v === '대상');

  if(v === '대상'){
    show(el('act-extra'));
  } else {
    hide(el('act-extra'));
    state.who = ''; state.spouseCombined = '';
    press(el('btn-who-self'), false);
    press(el('btn-who-spouse'), false);
    hide(el('spouse-wrap'));
  }
  validate();
}
el('btn-act-no').addEventListener('click', () => selectAct('비대상'));
el('btn-act-yes').addEventListener('click', () => selectAct('대상'));

function selectWho(v){
  state.who = v;
  press(el('btn-who-self'), v === '본인');
  press(el('btn-who-spouse'), v === '배우자');
  if(v === '배우자'){ show(el('spouse-wrap')); }
  else { hide(el('spouse-wrap')); state.spouseCombined = ''; }
  validate();
}
el('btn-who-self').addEventListener('click', () => selectWho('본인'));
el('btn-who-spouse').addEventListener('click', () => selectWho('배우자'));
el('spouseCombined').addEventListener('input', e => { state.spouseCombined = e.target.value.trim(); validate(); });

/* ================== 계좌 ================== */
const bankSelect = el('bankSelect');
const bankInput  = el('bankInput');

function syncBankState(){
  if(bankSelect.value === '__custom__'){
    bankSelect.classList.add('hidden');
    bankInput.classList.remove('hidden');
    bankInput.focus();
    state.bank = bankInput.value.trim();
  } else {
    bankInput.classList.add('hidden');
    bankSelect.classList.remove('hidden');
    state.bank = bankSelect.value.trim();
  }
  validate();
}
bankSelect.addEventListener('change', syncBankState);
bankInput.addEventListener('input', () => { state.bank = bankInput.value.trim(); validate(); });
el('account').addEventListener('input', e => { state.account = e.target.value; validate(); });

/* ================== 계좌 공개 ================== */
function selectOpen(v){ state.open = v; press(el('btn-open-yes'), v === '희망'); press(el('btn-open-no'), v === '비희망'); validate(); }
el('btn-open-yes').addEventListener('click', () => selectOpen('희망'));
el('btn-open-no').addEventListener('click', () => selectOpen('비희망'));

/* ================== 서명 캔버스 ================== */
(function initSignature(){
  const canvas = el('signCanvas');
  const ctx = canvas.getContext('2d');
  let drawing = false;
  let hasMark = false;

  ctx.strokeStyle = '#111';
  ctx.lineWidth = 2.5;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  function getPos(e){
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    const src = e.touches ? e.touches[0] : e;
    return {
      x: (src.clientX - rect.left) * scaleX,
      y: (src.clientY - rect.top)  * scaleY
    };
  }

  function startDraw(e){
    e.preventDefault();
    drawing = true;
    const pos = getPos(e);
    ctx.beginPath();
    ctx.moveTo(pos.x, pos.y);
  }

  function draw(e){
    if(!drawing) return;
    e.preventDefault();
    const pos = getPos(e);
    ctx.lineTo(pos.x, pos.y);
    ctx.stroke();
    hasMark = true;
  }

  function endDraw(e){
    if(!drawing) return;
    drawing = false;
    if(hasMark){
      state.signed = true;
      el('signData').value = canvas.toDataURL('image/png');
      validate();
    }
  }

  canvas.addEventListener('mousedown',  startDraw);
  canvas.addEventListener('mousemove',  draw);
  canvas.addEventListener('mouseup',    endDraw);
  canvas.addEventListener('mouseleave', endDraw);
  canvas.addEventListener('touchstart', startDraw, { passive: false });
  canvas.addEventListener('touchmove',  draw,      { passive: false });
  canvas.addEventListener('touchend',   endDraw);

  el('btnClearSign').addEventListener('click', () => {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    hasMark = false;
    state.signed = false;
    el('signData').value = '';
    validate();
  });
})();

/* ================== 검증 ================== */
function validate(){
  const btnPrev   = el('btn-preview');
  const btnSubmit = el('btn-submit');

  const disable = () => {
    btnPrev.classList.add('disabled');
    btnPrev.setAttribute('aria-disabled', 'true');
    btnSubmit.setAttribute('disabled', '');
  };
  const enable = () => {
    btnPrev.classList.remove('disabled');
    btnPrev.removeAttribute('aria-disabled');
    btnSubmit.removeAttribute('disabled');
  };

  if(!state.act) return disable();
  if(state.act === '대상' && !state.who) return disable();
  if(state.who === '배우자' && !state.spouseCombined) return disable();
  if(!state.bank) return disable();
  if(!/^[0-9-]{6,}$/.test(state.account)) return disable();
  if(!state.open) return disable();
  if(!state.signed) return disable();

  enable();
}

/* ================== 미리보기 ================== */
function buildSubject(){
  const prefix = PHASE1.status === '퇴임' ? '전)삼성전자' : '삼성전자';
  const title  = PHASE1.title ? ` ${PHASE1.title}` : '';
  return `[임원 조사] ${prefix}${title} ${PHASE1.name} 안내`;
}

function buildBody(){
  const prefix = PHASE1.status === '퇴임' ? '전)삼성전자' : '삼성전자';
  const lines = [];

  lines.push(`성명 : ${PHASE1.name}`);
  lines.push(`연락처 : ${PHASE1.phone}`);
  lines.push('');

  if(PHASE1.status === '재직'){
    lines.push(`소속 : ${prefix} ${PHASE1.dept}`);
    lines.push(`직급 : ${PHASE1.title}`);
  } else {
    lines.push(`소속 : ${prefix} (퇴임)`);
    if(PHASE1.dept)   lines.push(`전 소속 : ${PHASE1.dept} / ${PHASE1.title}`);
    if(PHASE1.curOrg) lines.push(`현직장 : ${PHASE1.curOrg}`);
  }
  lines.push('');

  lines.push(`청탁금지법 : ${state.act}`);
  if(state.act === '대상'){
    lines.push(`  - 대상자 : ${state.who}`);
    if(state.who === '배우자' && state.spouseCombined)
      lines.push(`  - 배우자 직장 및 직책 : ${state.spouseCombined}`);
  }
  lines.push('');

  lines.push(`계좌 : ${state.bank} ${state.account} (${PHASE1.name})`);
  lines.push(`계좌번호 공개 : ${state.open}`);

  return lines.join('\n');
}

el('btn-preview').addEventListener('click', () => {
  if(el('btn-preview').hasAttribute('aria-disabled')) return;
  el('previewSubject').textContent = buildSubject();
  el('previewBody').textContent    = buildBody();
  el('dlg').showModal();
});
el('dlg-cancel').addEventListener('click', () => el('dlg').close());

/* ================== 제출 ================== */
async function submit(){
  const subject = buildSubject();
  const body    = buildBody();
  const sign    = el('signData').value;

  const url = ENDPOINT
    + `?action=sendNotice`
    + `&subject=${encodeURIComponent(subject)}`
    + `&body=${encodeURIComponent(body)}`
    + `&sign=${encodeURIComponent(sign)}`;

  const res = await fetchJson(url);
  if(!res || res.ok !== true){
    throw new Error(res && res.error ? res.error : 'sendNotice failed');
  }
  return res;
}

el('dlg-ok').addEventListener('click', async () => {
  el('dlg').close();
  try{
    await submit();
    showToast('✅ 제출이 완료되었습니다.');
    // 제출 후 상태 초기화
    localStorage.removeItem('executive:phase1');
    localStorage.removeItem('executive:consent');
    setTimeout(() => { location.replace('./executive_privacy.html'); }, 2000);
  }catch(e){
    alert('제출 실패: ' + e.message);
  }
});

/* ================== 초기화 ================== */
validate();
</script>
</body>
</html>
